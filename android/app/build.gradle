plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0.0'
}

android {
    namespace "com.hidroapp.hidro"
    compileSdk 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        // Necessário pelo flutter_local_notifications para suportar APIs
        // de data/hora mais recentes em versões mais antigas do Android.
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.hidroapp.hidro"
        minSdk 23
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        // Chave fixa, guardada no repositório (debug-fixed.keystore), para
        // que cada build na cloud assine sempre com a mesma assinatura.
        // Sem isto, cada execução do GitHub Actions gera uma chave de
        // debug nova, e o Android trata cada APK como uma app diferente,
        // bloqueando a atualização por cima da versão já instalada.
        fixedDebug {
            keyAlias 'hidrodebug'
            keyPassword 'android123'
            storeFile file('debug-fixed.keystore')
            storePassword 'android123'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.fixedDebug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
